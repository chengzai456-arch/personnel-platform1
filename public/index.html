<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="pragma" content="no-cache">
<meta http-equiv="expires" content="0">
<title>工作台 - Workbench</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --primary: #4f46e5;
  --primary-light: #6366f1;
  --primary-dark: #3730a3;
  --primary-subtle: #eef2ff;
  --accent: #06b6d4;
  --accent-subtle: #ecfeff;
  --bg: #ffffff;
  --bg-warm: #f8fafc;
  --bg-card: #ffffff;
  --text: #0f172a;
  --text-secondary: #475569;
  --text-muted: #94a3b8;
  --border: #e2e8f0;
  --border-light: #f1f5f9;
  --success: #10b981;
  --success-subtle: #ecfdf5;
  --error: #ef4444;
  --error-subtle: #fef2f2;
  --radius: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --radius-pill: 50px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -1px rgba(0,0,0,0.04);
  --shadow-md: 0 10px 15px -3px rgba(0,0,0,0.08), 0 4px 6px -2px rgba(0,0,0,0.04);
  --shadow-lg: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04);
  --shadow-xl: 0 25px 50px -12px rgba(0,0,0,0.15);
  --font-body: 'Inter', -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --font-display: 'Plus Jakarta Sans', 'Inter', sans-serif;
  --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

body {
  font-family: var(--font-body);
  color: var(--text);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  overflow-x: hidden;
  line-height: 1.6;
}

/* ========== Loading Bar ========== */
.loading-bar {
  position: fixed; top: 0; left: 0; width: 0; height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--accent));
  z-index: 9999; border-radius: 0 2px 2px 0;
}

/* ========== Toast ========== */
.toast {
  position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
  padding: 12px 24px; border-radius: var(--radius-pill); font-size: 13px; font-weight: 500;
  z-index: 600; opacity: 0; pointer-events: none; white-space: nowrap;
  box-shadow: var(--shadow-md);
}
.toast.success { background: var(--success-subtle); color: #059669; border: 1px solid #a7f3d0; }
.toast.error { background: var(--error-subtle); color: #dc2626; border: 1px solid #fecaca; }

/* ============ NAV ============ */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  padding: 16px 40px; display: flex; align-items: center; justify-content: space-between;
  background: rgba(255,255,255,0.8); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border-light);
}

.nav-brand {
  display: flex; align-items: center; gap: 10px;
  font-family: var(--font-display); font-size: 18px; font-weight: 800; letter-spacing: -0.3px;
}
.nav-brand svg { width: 28px; height: 28px; }
.nav-brand-accent { color: var(--primary); }

.nav-right { display: flex; align-items: center; gap: 16px; }

.btn-outline {
  padding: 8px 20px; border-radius: var(--radius-pill); border: 1.5px solid var(--border);
  background: transparent; color: var(--text-secondary); font-size: 13px; font-weight: 600;
  cursor: pointer; font-family: var(--font-body); transition: var(--transition);
}
.btn-outline:hover { border-color: var(--primary); color: var(--primary); }

.btn-primary-nav {
  padding: 8px 24px; border-radius: var(--radius-pill); border: none;
  background: var(--primary); color: white; font-size: 13px; font-weight: 600;
  cursor: pointer; font-family: var(--font-body); transition: var(--transition);
  box-shadow: 0 2px 8px rgba(79,70,229,0.25);
}
.btn-primary-nav:hover { background: var(--primary-dark); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(79,70,229,0.3); }

/* ============ HERO / LOGIN ============ */
#login {
  min-height: 100vh; display: flex; align-items: center;
  padding: 80px 40px 40px; position: relative;
  background: linear-gradient(135deg, #f0f0ff 0%, #ffffff 50%, #ecfeff 100%);
  overflow: hidden;
}

#login::before {
  content: ''; position: absolute; width: 700px; height: 700px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(79,70,229,0.06) 0%, transparent 70%);
  top: -200px; right: -100px; pointer-events: none;
}
#login::after {
  content: ''; position: absolute; width: 500px; height: 500px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(6,182,212,0.05) 0%, transparent 70%);
  bottom: -150px; left: -100px; pointer-events: none;
}

.hero-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center;
  max-width: 1200px; margin: 0 auto; width: 100%; position: relative; z-index: 1;
}

.hero-left { padding-right: 40px; }

.hero-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 14px; border-radius: var(--radius-pill);
  background: var(--primary-subtle); color: var(--primary);
  font-size: 12px; font-weight: 600; margin-bottom: 24px;
}
.hero-badge-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--primary); }

.hero-title {
  font-family: var(--font-display);
  font-size: 44px; font-weight: 800; line-height: 1.15; letter-spacing: -1px;
  margin-bottom: 16px; color: var(--text);
}
.hero-title span { color: var(--primary); }
.hero-title .accent { color: var(--accent); }

.hero-desc {
  font-size: 16px; color: var(--text-secondary); line-height: 1.7; margin-bottom: 36px; max-width: 480px;
}

.hero-cta {
  display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
}

.feishu-btn {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 14px 32px; border: none;
  border-radius: var(--radius-pill); font-size: 15px; font-weight: 600;
  cursor: pointer; font-family: var(--font-body); position: relative; overflow: hidden;
  background: var(--primary); color: white;
  box-shadow: 0 4px 16px rgba(79,70,229,0.3);
  transition: var(--transition);
}
.feishu-btn:hover { background: var(--primary-dark); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(79,70,229,0.35); }
.feishu-btn:active { transform: scale(0.98); }
.feishu-btn svg { width: 20px; height: 20px; fill: white; flex-shrink: 0; }

.alt-toggle {
  background: none; border: 1.5px solid var(--border); color: var(--text-secondary);
  padding: 14px 24px; border-radius: var(--radius-pill); font-size: 14px; font-weight: 500;
  cursor: pointer; font-family: var(--font-body); transition: var(--transition);
}
.alt-toggle:hover { border-color: var(--primary); color: var(--primary); }

.admin-form-wrap {
  margin-top: 16px; display: none; width: 100%;
}
.admin-form-wrap.show { display: block; }

.admin-form-inner {
  display: flex; gap: 10px; max-width: 400px;
}

.admin-input {
  flex: 1; padding: 12px 18px; border: 1.5px solid var(--border);
  border-radius: var(--radius-pill); font-size: 14px; color: var(--text);
  background: var(--bg); outline: none; font-family: var(--font-body); transition: var(--transition);
}
.admin-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }

.admin-submit {
  padding: 12px 24px; border: none; border-radius: var(--radius-pill);
  background: var(--text); color: white; font-size: 13px; font-weight: 600;
  cursor: pointer; font-family: var(--font-body); transition: var(--transition);
}
.admin-submit:hover { background: #1e293b; }

.login-error { color: var(--error); font-size: 12px; margin-top: 10px; min-height: 18px; }

.hero-stats {
  display: flex; gap: 40px; margin-top: 48px;
  padding-top: 32px; border-top: 1px solid var(--border-light);
}
.stat-num { font-family: var(--font-display); font-size: 24px; font-weight: 800; color: var(--text); }
.stat-label { font-size: 13px; color: var(--text-muted); margin-top: 2px; }

.hero-right {
  display: flex; align-items: center; justify-content: center;
}

.hero-card-preview {
  background: var(--bg-card); border-radius: var(--radius-xl);
  padding: 32px; width: 100%; max-width: 440px;
  box-shadow: var(--shadow-xl); border: 1px solid var(--border-light);
}

.preview-header {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px;
}
.preview-header h3 { font-size: 16px; font-weight: 700; }
.preview-header span { font-size: 12px; color: var(--text-muted); }
.preview-header-accent { color: var(--primary); font-weight: 600; }

.preview-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
}

.preview-card {
  padding: 16px; border-radius: var(--radius); border: 1px solid var(--border-light);
  background: var(--bg-warm); text-align: center;
}
.preview-card-icon {
  width: 36px; height: 36px; border-radius: 10px;
  background: var(--primary-subtle); display: flex; align-items: center; justify-content: center;
  margin: 0 auto 8px;
}
.preview-card-icon svg { width: 18px; height: 18px; fill: var(--primary); }
.preview-card-name { font-size: 12px; font-weight: 600; color: var(--text); }
.preview-card-url { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

.preview-footer {
  margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border-light);
  display: flex; justify-content: space-between; align-items: center;
}
.preview-footer span { font-size: 12px; color: var(--text-muted); }
.preview-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); display: inline-block; margin-right: 6px; }

/* ============ LOGIN FOOTER ============ */
.login-footer {
  text-align: center; padding: 20px; font-size: 13px; color: var(--text-muted);
  border-top: 1px solid var(--border-light);
}

/* ============ DASHBOARD ============ */
#dashboard { display: none; min-height: 100vh; background: var(--bg-warm); }

.dash-topbar {
  position: sticky; top: 0; z-index: 50;
  background: rgba(255,255,255,0.85); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border-light);
  padding: 0 32px; height: 60px;
  display: flex; align-items: center; justify-content: space-between;
}

.dash-topbar-left { display: flex; align-items: center; gap: 12px; }
.dash-topbar-logo { width: 28px; height: 28px; background: var(--primary); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
.dash-topbar-logo svg { width: 14px; height: 14px; fill: white; }
.dash-topbar-title { font-family: var(--font-display); font-size: 15px; font-weight: 700; }
.dash-topbar-accent { color: var(--primary); }

.dash-topbar-right { display: flex; align-items: center; gap: 16px; }
.dash-user { display: flex; align-items: center; gap: 10px; cursor: default; }
.dash-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  display: flex; align-items: center; justify-content: center;
  color: white; font-size: 13px; font-weight: 600;
}
.dash-name { font-size: 13px; font-weight: 500; color: var(--text-secondary); }
.dash-badge { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 4px; background: var(--primary-subtle); color: var(--primary); }
.dash-logout {
  padding: 8px 18px; border: 1.5px solid var(--border);
  border-radius: var(--radius-pill); background: transparent;
  color: var(--text-secondary); font-size: 13px; font-weight: 600;
  cursor: pointer; font-family: var(--font-body); transition: var(--transition);
  display: inline-flex; align-items: center; gap: 6px;
}
.dash-logout:hover { border-color: var(--error); color: var(--error); background: var(--error-subtle); }

.dash-main { padding: 32px; max-width: 1200px; margin: 0 auto; }

.page-header {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px;
}

.page-header-left h1 {
  font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: -0.3px;
}
.page-header-left p { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }

.add-btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 24px; border: none;
  border-radius: var(--radius-pill); font-size: 13px; font-weight: 600;
  cursor: pointer; font-family: var(--font-body); position: relative; overflow: hidden;
  background: var(--primary); color: white;
  box-shadow: 0 2px 8px rgba(79,70,229,0.25);
  transition: var(--transition);
}
.add-btn:hover { background: var(--primary-dark); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(79,70,229,0.3); }
.add-btn:active { transform: scale(0.97); }
.add-btn svg { width: 14px; height: 14px; stroke: white; stroke-width: 2.5; }

/* Cards grid */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 16px;
}

.card {
  background: var(--bg-card); border-radius: var(--radius-lg);
  padding: 24px; border: 1px solid var(--border-light);
  cursor: pointer; position: relative; overflow: hidden;
  text-decoration: none; color: inherit; display: block;
  transition: var(--transition); box-shadow: var(--shadow-sm);
}

.card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--accent));
  transform: scaleX(0); transform-origin: left;
  transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.card:hover {
  border-color: transparent; transform: translateY(-3px);
  box-shadow: var(--shadow-lg);
}
.card:hover::before { transform: scaleX(1); }

.card-icon {
  width: 42px; height: 42px; border-radius: var(--radius);
  background: var(--primary-subtle); display: flex;
  align-items: center; justify-content: center; margin-bottom: 16px;
  transition: var(--transition);
}
.card:hover .card-icon { background: var(--primary-subtle); transform: scale(1.05); }
.card-icon svg { width: 20px; height: 20px; fill: var(--primary); }

.card-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; color: var(--text); }
.card-url { font-size: 12px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.card-delete {
  position: absolute; top: 12px; right: 12px; width: 26px; height: 26px;
  border-radius: 50%; border: none; background: transparent;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: var(--transition); z-index: 2;
}
.card:hover .card-delete { opacity: 1; }
.card-delete:hover { background: var(--error-subtle); transform: scale(1.1); }
.card-delete svg { width: 14px; height: 14px; fill: var(--error); }

.readonly-badge {
  position: absolute; top: 14px; right: 14px;
  font-size: 10px; color: var(--text-muted); padding: 3px 10px;
  border: 1px solid var(--border); border-radius: var(--radius-pill);
}

/* Empty state */
.empty-state {
  text-align: center; padding: 80px 20px; color: var(--text-secondary); grid-column: 1 / -1;
}
.empty-state-icon {
  width: 64px; height: 64px; margin: 0 auto 20px;
  background: var(--primary-subtle); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}
.empty-state-icon svg { width: 28px; height: 28px; fill: var(--primary); opacity: 0.4; }
.empty-state h3 { font-size: 16px; font-weight: 600; color: var(--text-secondary); margin-bottom: 8px; }
.empty-state p { font-size: 13px; }

/* ============ MODAL ============ */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(15,23,42,0.4); backdrop-filter: blur(6px);
  z-index: 500; display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
}
.modal-overlay.active { pointer-events: auto; }

.modal {
  background: var(--bg-card); border-radius: var(--radius-xl);
  padding: 32px; width: 420px; max-width: calc(100vw - 32px);
  box-shadow: var(--shadow-xl); border: 1px solid var(--border-light);
  transform: scale(0.9) translateY(10px); opacity: 0;
}

.modal-title { font-size: 18px; font-weight: 700; margin-bottom: 24px; color: var(--text); }
.form-group { margin-bottom: 20px; }
.form-label { display: block; font-size: 13px; font-weight: 500; color: var(--text-secondary); margin-bottom: 8px; }
.form-input {
  width: 100%; padding: 12px 16px;
  border: 1.5px solid var(--border); border-radius: var(--radius);
  font-size: 14px; color: var(--text); background: var(--bg);
  outline: none; font-family: var(--font-body); transition: var(--transition);
}
.form-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }
.form-input::placeholder { color: var(--text-muted); }

.modal-actions { display: flex; justify-content: flex-end; gap: 12px; margin-top: 28px; }

.btn-cancel {
  padding: 10px 24px; border: 1.5px solid var(--border);
  border-radius: var(--radius-pill); background: transparent;
  color: var(--text-secondary); font-size: 13px; font-weight: 500;
  cursor: pointer; transition: var(--transition); font-family: var(--font-body);
}
.btn-cancel:hover { border-color: var(--text-muted); }

.btn-primary {
  padding: 10px 28px; border: none; border-radius: var(--radius-pill);
  background: var(--primary); color: white; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: var(--transition); font-family: var(--font-body);
  box-shadow: 0 2px 8px rgba(79,70,229,0.25);
}
.btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(79,70,229,0.3); }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

/* ============ RESPONSIVE ============ */
@media (max-width: 900px) {
  .hero-grid { grid-template-columns: 1fr; gap: 40px; }
  .hero-left { padding-right: 0; }
  .hero-title { font-size: 32px; }
  .hero-right { display: none; }
  nav { padding: 14px 20px; }
  #login { padding: 100px 20px 40px; }
  .dash-topbar { padding: 0 16px; }
  .dash-main { padding: 20px 16px; }
  .page-header { flex-direction: column; align-items: flex-start; gap: 16px; }
  .hero-stats { gap: 24px; }
  .admin-form-inner { flex-direction: column; }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}
</style>
</head>
<body>

<!-- Loading Bar -->
<div class="loading-bar" id="loadingBar"></div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- ===== NAV ===== -->
<nav>
  <div class="nav-brand">
    <svg viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="7" height="7" rx="1.5" fill="#4f46e5"/><rect x="14" y="3" width="7" height="7" rx="1.5" fill="#06b6d4"/><rect x="3" y="14" width="7" height="7" rx="1.5" fill="#06b6d4"/><rect x="14" y="14" width="7" height="7" rx="1.5" fill="#4f46e5"/></svg>
    <span>W<span class="nav-brand-accent">ORK</span>BENCH</span>
  </div>
  <div class="nav-right">
    <button class="btn-outline" onclick="showToast('使用飞书登录即可开始', 'success')">帮助</button>
  </div>
</nav>

<!-- ===== HERO / LOGIN ===== -->
<section id="login">
  <div class="hero-grid">
    <div class="hero-left">
      <div class="hero-badge">
        <span class="hero-badge-dot"></span>
        团队效率工具
      </div>
      <h1 class="hero-title">
        统一管理你的<br/>
        <span>常用工具</span>与<span class="accent">链接</span>
      </h1>
      <p class="hero-desc">
        将日常使用的系统、平台、工具集中到一处，一键直达。<br/>
        支持飞书登录，团队协作更高效。
      </p>
      <div class="hero-cta">
        <button class="feishu-btn" id="loginBtn">
          <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
          通过飞书登录
        </button>
        <button class="alt-toggle" id="adminToggle">管理员密钥</button>
      </div>
      <div class="admin-form-wrap" id="adminForm">
        <div class="admin-form-inner">
          <input class="admin-input" id="adminKeyInput" type="password" placeholder="输入管理员密钥" autocomplete="off">
          <button class="admin-submit" id="adminSubmit">验证</button>
        </div>
        <div class="login-error" id="loginError"></div>
      </div>
      <div class="hero-stats">
        <div>
          <div class="stat-num" id="statItems">5</div>
          <div class="stat-label">已接入工具</div>
        </div>
        <div>
          <div class="stat-num">1</div>
          <div class="stat-label">团队</div>
        </div>
        <div>
          <div class="stat-num" id="statUptime">99.9%</div>
          <div class="stat-label">可用性</div>
        </div>
      </div>
    </div>
    <div class="hero-right">
      <div class="hero-card-preview">
        <div class="preview-header">
          <h3>常用工具</h3>
          <span><span class="preview-header-accent">飞书</span> · 同步中</span>
        </div>
        <div class="preview-grid">
          <div class="preview-card">
            <div class="preview-card-icon"><svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 18H6V4h7v5h5v11z"/></svg></div>
            <div class="preview-card-name">飞书文档</div>
            <div class="preview-card-url">feishu.cn</div>
          </div>
          <div class="preview-card">
            <div class="preview-card-icon"><svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg></div>
            <div class="preview-card-name">项目管理</div>
            <div class="preview-card-url">project</div>
          </div>
          <div class="preview-card">
            <div class="preview-card-icon"><svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/></svg></div>
            <div class="preview-card-name">数据分析</div>
            <div class="preview-card-url">data</div>
          </div>
          <div class="preview-card">
            <div class="preview-card-icon"><svg viewBox="0 0 24 24"><path d="M9 11H7v2h2v-2zm4 4h-2v2h2v-2zM9 3H7v2h2V3zm4 8h-2v2h2v-2zM5 3H3v2h2V3zm12 0h-2v2h2V3zm-4 4h-2v2h2V7zM5 7H3v2h2V7zm12 4h-2v2h2v-2zm-4 4h-2v2h2v-2z"/></svg></div>
            <div class="preview-card-name">审批中心</div>
            <div class="preview-card-url">approval</div>
          </div>
        </div>
        <div class="preview-footer">
          <span><span class="preview-dot"></span>所有服务正常</span>
          <span style="font-weight:600;color:var(--primary);font-size:12px;">登录后查看 →</span>
        </div>
      </div>
    </div>
  </div>
</section>

<div class="login-footer">飞书 OAuth 登录 · 安全可靠</div>

<!-- ===== DASHBOARD ===== -->
<div id="dashboard">
  <div class="dash-topbar">
    <div class="dash-topbar-left">
      <div class="dash-topbar-logo">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5" fill="white"/><rect x="14" y="3" width="7" height="7" rx="1.5" fill="rgba(255,255,255,0.6)"/><rect x="3" y="14" width="7" height="7" rx="1.5" fill="rgba(255,255,255,0.6)"/><rect x="14" y="14" width="7" height="7" rx="1.5" fill="white"/></svg>
      </div>
      <span class="dash-topbar-title">W<span class="dash-topbar-accent">ORK</span>BENCH</span>
    </div>
    <div class="dash-topbar-right">
      <div class="dash-user">
        <div class="dash-avatar" id="userAvatar">管</div>
        <span class="dash-name" id="userName">管理员</span>
        <span class="dash-badge">管理</span>
      </div>
      <button class="dash-logout" id="logoutBtn">退出</button>
    </div>
  </div>

  <main class="dash-main">
    <div class="page-header">
      <div class="page-header-left">
        <h1>我的工具</h1>
        <p>快速访问常用的系统与链接</p>
      </div>
      <button class="add-btn" id="addBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        添加工具
      </button>
    </div>
    <div class="cards-grid" id="cardsGrid"></div>

    <div style="text-align:center;margin-top:40px;padding-top:32px;border-top:1px solid var(--border-light)">
      <button class="dash-logout" id="logoutBtnBottom" style="padding:12px 36px;font-size:14px;border-color:var(--error);color:var(--error);background:var(--error-subtle)">
        退出登录
      </button>
      <p style="font-size:12px;color:var(--text-muted);margin-top:8px">退出后返回首页，重新登录需要飞书授权</p>
    </div>
  </main>
</div>

<!-- ===== MODAL ===== -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 class="modal-title">添加工具</h2>
    <div class="form-group">
      <label class="form-label" for="inputName">名称</label>
      <input class="form-input" id="inputName" type="text" placeholder="例如：项目管理" autocomplete="off">
    </div>
    <div class="form-group">
      <label class="form-label" for="inputUrl">链接地址</label>
      <input class="form-input" id="inputUrl" type="url" placeholder="https://..." autocomplete="off">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" id="modalCancel">取消</button>
      <button class="btn-primary" id="modalSubmit">添加</button>
    </div>
  </div>
</div>

<script>
const SESSION_STORE = 'workbench_session'
const USER_STORE = 'workbench_user'
const getToken = () => localStorage.getItem(SESSION_STORE)
const getUser = () => { try { return JSON.parse(localStorage.getItem(USER_STORE)) } catch { return null } }
const isAdmin = () => !!getToken()

const API_BASE = window.location.port === '3001' || window.location.port === '3002'
  ? 'http://localhost:3001/api'
  : '/api'

/* ============ GSAP ============ */
const mm = gsap.matchMedia()

function animateLanding() {
  mm.add('(prefers-reduced-motion: no-preference)', () => {
    const tl = gsap.timeline()
    tl.from('nav', { y: -20, opacity: 0, duration: 0.4, ease: 'power2.out' })
      .from('.hero-left', { x: -30, opacity: 0, duration: 0.6, ease: 'power3.out' }, '-=0.2')
      .from('.hero-right', { x: 30, opacity: 0, duration: 0.6, ease: 'power3.out' }, '-=0.5')
      .from('.hero-stats', { y: 20, opacity: 0, duration: 0.4, ease: 'power2.out' }, '-=0.2')
      .from('.preview-card', { y: 15, opacity: 0, duration: 0.4, stagger: 0.08, ease: 'power2.out' }, '-=0.2')

    // Preview card hover
    document.querySelectorAll('.preview-card').forEach(c => {
      c.addEventListener('mouseenter', () => {
        gsap.to(c, { y: -4, scale: 1.02, duration: 0.2, ease: 'power2.out' })
      })
      c.addEventListener('mouseleave', () => {
        gsap.to(c, { y: 0, scale: 1, duration: 0.2, ease: 'power2.out' })
      })
    })
  })
}

function loginTransition() {
  gsap.to('#loadingBar', { width: '60%', duration: 0.5, ease: 'power2.out' })
  document.getElementById('login').style.display = 'none'
  document.querySelector('.login-footer').style.display = 'none'
  document.getElementById('dashboard').style.display = 'block'
  gsap.to('#loadingBar', { width: '100%', duration: 0.2, opacity: 0, delay: 0.1 })
  enterDashboard()
  loadAndRender()
}

function enterDashboard() {
  mm.add('(prefers-reduced-motion: no-preference)', () => {
    gsap.from('.dash-topbar', { y: -20, opacity: 0, duration: 0.3, ease: 'power2.out' })
    gsap.from('.page-header', { y: 16, opacity: 0, duration: 0.35, ease: 'power2.out', delay: 0.1 })
    gsap.to('#statusDot', { scale: 1.4, opacity: 0.6, duration: 1.5, repeat: -1, yoyo: true, ease: 'sine.inOut' })
  })
}

function animateCards() {
  mm.add('(prefers-reduced-motion: no-preference)', () => {
    gsap.from('.card', { opacity: 0, y: 24, duration: 0.5, stagger: 0.07, ease: 'power3.out', clearProps: 'transform' })
  })
}

function animateEmptyState() {
  mm.add('(prefers-reduced-motion: no-preference)', () => {
    gsap.to('.empty-state-icon', { y: -6, duration: 2.5, repeat: -1, yoyo: true, ease: 'sine.inOut' })
  })
}

function openModalAnimated() {
  const overlay = document.getElementById('modalOverlay')
  const modal = document.querySelector('.modal')
  overlay.classList.add('active')
  mm.add('(prefers-reduced-motion: no-preference)', () => {
    gsap.to(overlay, { opacity: 1, duration: 0.2, ease: 'power2.out' })
    gsap.fromTo(modal, { scale: 0.9, y: 15, opacity: 0 }, { scale: 1, y: 0, opacity: 1, duration: 0.35, ease: 'back.out(1.7)' })
  })
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) { overlay.style.opacity = 1; modal.style.opacity = 1; modal.style.transform = 'scale(1) translateY(0)' }
  setTimeout(() => document.getElementById('inputName').focus(), 150)
}

function closeModalAnimated() {
  const overlay = document.getElementById('modalOverlay')
  const modal = document.querySelector('.modal')
  mm.add('(prefers-reduced-motion: no-preference)', () => {
    gsap.to(modal, { scale: 0.9, y: 10, opacity: 0, duration: 0.2, ease: 'power2.in', onComplete: () => { overlay.classList.remove('active'); modal.style.opacity = ''; modal.style.transform = '' } })
    gsap.to(overlay, { opacity: 0, duration: 0.15, delay: 0.05 })
  })
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) { overlay.classList.remove('active') }
}

function createRipple(e, el) {
  const rect = el.getBoundingClientRect()
  const size = Math.max(rect.width, rect.height) * 1.5
  const ripple = document.createElement('span')
  ripple.style.cssText = 'position:absolute;border-radius:50%;background:rgba(255,255,255,0.25);transform:scale(0);pointer-events:none;width:'+size+'px;height:'+size+'px;left:'+(e.clientX-rect.left-size/2)+'px;top:'+(e.clientY-rect.top-size/2)+'px'
  el.appendChild(ripple)
  gsap.to(ripple, { scale: 2.5, opacity: 0, duration: 0.5, ease: 'power2.out', onComplete: () => ripple.remove() })
}

/* ============ Toast ============ */
function showToast(msg, type) {
  const el = document.getElementById('toast')
  el.textContent = msg; el.className = 'toast ' + type
  mm.add('(prefers-reduced-motion: no-preference)', () => {
    gsap.killTweensOf(el); gsap.set(el, { opacity: 0, y: -10 })
    gsap.to(el, { opacity: 1, y: 0, duration: 0.25, ease: 'power2.out' })
    gsap.to(el, { opacity: 0, y: -10, duration: 0.25, ease: 'power2.in', delay: 2.5 })
  })
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) { el.style.opacity = 1; setTimeout(() => { el.style.opacity = 0 }, 2500) }
}

/* ============ API ============ */
async function fetchItems() {
  const res = await fetch(API_BASE + '/items')
  if (!res.ok) throw new Error('加载失败')
  return await res.json()
}

async function addItem(name, url) {
  const res = await fetch(API_BASE + '/items', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + getToken() }, body: JSON.stringify({ name, url }) })
  if (!res.ok) { const err = await res.json(); throw new Error(err.error || '添加失败') }
  return await res.json()
}

async function deleteItem(id) {
  const res = await fetch(API_BASE + '/items?id=' + id, { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + getToken() } })
  if (!res.ok) { const err = await res.json(); throw new Error(err.error || '删除失败') }
}

/* ============ Render ============ */
async function loadAndRender() {
  const grid = document.getElementById('cardsGrid')
  try { itemsData = await fetchItems(); document.getElementById('statItems').textContent = itemsData.length }
  catch { try { itemsData = JSON.parse(localStorage.getItem('workbench_items') || '[]') } catch { itemsData = [] } }

  if (!itemsData || itemsData.length === 0) {
    grid.innerHTML = '<div class="empty-state"><div class="empty-state-icon"><svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg></div><h3>还没有工具</h3><p>点击右上角「添加工具」开始添加</p></div>'
    animateEmptyState(); return
  }

  const admin = isAdmin()
  grid.innerHTML = itemsData.map(item => '<a class="card" href="' + escapeHtml(item.url) + '" target="_blank" rel="noopener noreferrer" data-id="' + item.id + '">' +
    (admin ? '<button class="card-delete" data-delete-id="' + item.id + '" title="删除" aria-label="删除 ' + escapeHtml(item.name) + '"><svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg></button>' : '<span class="readonly-badge">只读</span>') +
    '<div class="card-icon"><svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 18H6V4h7v5h5v11z"/></svg></div>' +
    '<div class="card-name">' + escapeHtml(item.name) + '</div><div class="card-url">' + escapeHtml(item.url) + '</div></a>').join('')

  if (admin) {
    grid.querySelectorAll('[data-delete-id]').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        e.preventDefault(); e.stopPropagation()
        const id = btn.getAttribute('data-delete-id'); const card = btn.closest('.card')
        gsap.to(card, { scale: 0.9, opacity: 0, duration: 0.2, ease: 'power2.in' })
        setTimeout(async () => {
          try { await deleteItem(id); showToast('已删除', 'success'); await loadAndRender() }
          catch (err) { showToast(err.message, 'error'); await loadAndRender() }
        }, 250)
      })
    })
  }
  animateCards()
}

function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML }

/* ============ Login ============ */
function feishuLogin() { window.location.href = API_BASE.replace('/api', '') + '/api/auth/login' }
function login() { loginTransition(); document.querySelector('.login-footer').style.display = 'none' }

function adminLogin() {
  const key = document.getElementById('adminKeyInput').value.trim()
  const errEl = document.getElementById('loginError')
  if (!key) { errEl.textContent = '请输入管理员密钥'; return }
  localStorage.setItem(SESSION_STORE, key); errEl.textContent = ''
  fetchItems().then(() => login()).catch(() => login())
}

function logout() {
  localStorage.removeItem(SESSION_STORE); localStorage.removeItem(USER_STORE)
  document.getElementById('dashboard').style.display = 'none'
  document.getElementById('login').style.display = 'flex'
  document.querySelector('.login-footer').style.display = 'block'
}

/* ============ Modal ============ */
function openModal() { document.getElementById('inputName').value = ''; document.getElementById('inputUrl').value = ''; openModalAnimated() }
function closeModal() { closeModalAnimated() }

async function handleAdd() {
  if (!isAdmin()) { showToast('只有管理员才能添加工具', 'error'); return }
  const name = document.getElementById('inputName').value.trim()
  let url = document.getElementById('inputUrl').value.trim()
  if (!name || !url) { showToast('请填写工具名称和链接', 'error'); return }
  if (!/^https?:\/\//i.test(url)) url = 'https://' + url
  try { new URL(url) } catch { showToast('请输入有效的链接地址', 'error'); return }
  const btn = document.getElementById('modalSubmit')
  btn.disabled = true; btn.textContent = '添加中...'
  try { await addItem(name, url); closeModal(); showToast('添加成功', 'success'); await loadAndRender() }
  catch (err) { showToast(err.message, 'error') }
  finally { btn.disabled = false; btn.textContent = '添加' }
}

/* ============ Init ============ */
document.addEventListener('DOMContentLoaded', () => {
  animateLanding()

  const params = new URLSearchParams(window.location.search)
  const sessionFromUrl = params.get('session')
  const nameFromUrl = params.get('name')
  const avatarFromUrl = params.get('avatar')
  const authError = params.get('auth_error')

  if (sessionFromUrl) {
    localStorage.setItem(SESSION_STORE, sessionFromUrl)
    localStorage.setItem(USER_STORE, JSON.stringify({ name: nameFromUrl || '管理员', avatar: avatarFromUrl || '' }))
    window.history.replaceState({}, '', '/')
  }

  if (authError === 'not_admin') { showToast('该飞书账号不是管理员，无法登录', 'error') }
  else if (authError) { showToast('登录失败：' + authError, 'error') }

  const user = getUser()
  if (isAdmin() && user) {
    document.getElementById('login').style.display = 'none'
    document.querySelector('.login-footer').style.display = 'none'
    document.getElementById('dashboard').style.display = 'block'
    document.getElementById('loadingBar').style.width = '100%'
    setTimeout(() => { document.getElementById('loadingBar').style.opacity = '0' }, 300)
    const avatarEl = document.getElementById('userAvatar'); const nameEl = document.getElementById('userName')
    if (user.name) { nameEl.textContent = user.name; avatarEl.textContent = user.name.charAt(0) }
    if (user.avatar) { avatarEl.style.backgroundImage = 'url(' + user.avatar + ')'; avatarEl.style.backgroundSize = 'cover'; avatarEl.textContent = '' }
    enterDashboard(); loadAndRender()
  }

  document.getElementById('loginBtn').addEventListener('click', (e) => { createRipple(e, e.currentTarget); setTimeout(feishuLogin, 300) })
  document.getElementById('adminToggle').addEventListener('click', () => {
    const form = document.getElementById('adminForm'); form.classList.toggle('show')
  })
  document.getElementById('adminSubmit').addEventListener('click', adminLogin)
  document.getElementById('adminKeyInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') adminLogin() })
  document.getElementById('logoutBtn').addEventListener('click', logout)
  const logoutBottom = document.getElementById('logoutBtnBottom')
  if (logoutBottom) logoutBottom.addEventListener('click', logout)
  document.getElementById('addBtn').addEventListener('click', (e) => {
    createRipple(e, e.currentTarget)
    if (!isAdmin()) { showToast('只有管理员才能管理工具', 'error'); return }
    setTimeout(openModal, 150)
  })
  document.getElementById('modalCancel').addEventListener('click', closeModal)
  document.getElementById('modalSubmit').addEventListener('click', handleAdd)
  document.getElementById('modalOverlay').addEventListener('click', (e) => { if (e.target === e.currentTarget) closeModal() })
  document.getElementById('inputUrl').addEventListener('keydown', (e) => { if (e.key === 'Enter') handleAdd() })
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') { const overlay = document.getElementById('modalOverlay'); if (overlay.classList.contains('active')) closeModal() }
  })
})
</script>
</body>
</html>
